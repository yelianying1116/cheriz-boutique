<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chez Riz Boutique</title>

<meta
name="description"
content="Fresh homemade meals prepared daily."
>

<link
rel="stylesheet"
href="css/style.css"
>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
>

</head>

<body>

<!-- =====================================
HEADER
====================================== -->

<header class="header">

<div class="container">

<a href="index.html" class="logo">

Chez Riz

</a>

<nav>

<a href="#today">

Plat du jour

</a>

<a href="#plats">

Nos plats

</a>

<a href="cart.html">

Panier

</a>

</nav>

</div>

</header>

<!-- =====================================
HERO
====================================== -->

<section class="hero">

<div class="container">

<h1>

Plat du jour

</h1>

<p>

Chaque jour, un seul plat.

</p>

</div>

</section>

<!-- =====================================
TODAY
====================================== -->

<section
id="today"
class="today-section"
>

<div class="container">

<a
id="daily-link"
class="today-link"
>

<div class="today-card">

<!-- 左侧 -->

<div class="today-content">

<h2
id="daily-name"
></h2>

<div
class="price"
id="daily-price"
></div>

<p
id="daily-description"
></p>

<div
class="tags"
id="daily-tags"
>

</div>

<button>

Commander

</button>

</div>

<!-- 右侧 -->

<div class="today-image">

<img
id="daily-image"
alt="Plat du jour"
>

</div>

</div>

</a>

<div class="intro">

<p>

Dès que vous réservez votre plat du jour,
votre commande est immédiatement prise en compte.

</p>

<p>

Chaque matin,
nous préparons votre repas avec des ingrédients frais.

</p>

</div>

</div>

</section>
<!-- =====================================
NOS PLATS
====================================== -->

<section
id="plats"
class="menu-section"
>

<div class="container">

<h1 class="section-title">

Nos plats

</h1>

<div
id="menu-list"
class="menu-grid"
>

<!-- JavaScript 自动生成 -->

</div>

</div>

</section>

<!-- =====================================
FOOTER
====================================== -->

<footer>

<div class="container">

<p>

© 2025 Chez Riz Boutique

</p>

</div>

</footer>

<!-- =====================================
PRODUCT DATABASE
====================================== -->

<script src="js/products.js"></script>

<!-- =====================================
HOME PAGE SCRIPT
====================================== -->

<script>

// ===========================
// 今日推荐
// ===========================

const daily = getDailyProduct();

// 跳转链接
document.getElementById("daily-link").href =
"plat.html?id=" + daily.id;

// 名称
document.getElementById("daily-name").textContent =
daily.name;

// 价格
document.getElementById("daily-price").textContent =
daily.price.toFixed(2) + " €";

// 描述
document.getElementById("daily-description").textContent =
daily.shortDescription;

// 图片
document.getElementById("daily-image").src =
daily.image;

// 图片描述
document.getElementById("daily-image").alt =
daily.name;

// 标签
const tagsBox =
document.getElementById("daily-tags");

daily.allergens.forEach(tag=>{

const span =
document.createElement("span");

span.textContent = tag;

tagsBox.appendChild(span);

});


// ===========================
// Nos plats
// ===========================

const menu =
getMenuProducts();

const menuBox =
document.getElementById("menu-list");

menu.forEach(product=>{

const card =

`
<a
href="plat.html?id=${product.id}"
class="menu-item"
>

<div class="menu-card">

<div class="menu-image">

<img
src="${product.image}"
alt="${product.name}"
>

</div>

<div class="menu-content">

<h2>

${product.name}

</h2>

<p>

${product.shortDescription}

</p>

</div>

</div>

</a>

`;

menuBox.innerHTML += card;

});

</script>

</body>

</html>
